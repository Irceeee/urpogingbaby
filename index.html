<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh; /* allow scrolling */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #ffb6c1, #ffc0cb);
      font-family: 'Poppins', sans-serif;
      color: #fff;
      text-align: center;
      overflow-y: auto;
    }
    h1 { font-size: 2em; margin-bottom: 20px; }
    button {
      margin: 10px;
      padding: 12px 25px;
      font-size: 1em;
      border: none;
      border-radius: 30px;
      background: #ff69b4;
      color: white;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      /* Always glowing + pulsing */
      animation: glow 1.5s ease-in-out infinite alternate, pulse 1.5s ease-in-out infinite;
    }
    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #fff;
    }

    @keyframes glow {
      from { box-shadow: 0 0 5px #ff69b4; }
      to   { box-shadow: 0 0 20px #fff; }
    }
    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      font-size: 24px;
      opacity: 0.7;
      animation: floatUp 8s linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }

    /* Envelope emoji styling */
    .envelope {
      font-size: 8em; /* bigger emoji */
      cursor: pointer;
      animation: jiggle 1s infinite;
      transition: transform 1s ease, opacity 1s ease;
      margin-top: 100px;
    }
    .envelope.zoom {
      transform: scale(5); /* zoom in */
      opacity: 0;
    }
    @keyframes jiggle {
      0%   { transform: rotate(0deg); }
      25%  { transform: rotate(5deg); }
      50%  { transform: rotate(-5deg); }
      75%  { transform: rotate(5deg); }
      100% { transform: rotate(0deg); }
    }
  </style>
</head>
<body>
  <h1 id="question">Do you want to read this message? 💕</h1>
  <button id="yesBtn" onclick="nextQuestion()">Yes</button>

  <!-- floating hearts -->
  <div class="heart" style="left:10%; animation-delay:0s;">❤️</div>
  <div class="heart" style="left:30%; animation-delay:2s;">💖</div>
  <div class="heart" style="left:50%; animation-delay:4s;">💕</div>
  <div class="heart" style="left:70%; animation-delay:6s;">💞</div>
  <div class="heart" style="left:85%; animation-delay:8s;">💓</div>

  <!-- Envelope with heart emoji -->
  <div id="envelope" class="envelope" style="display:none;">💌</div>
  <audio id="popSound" src="pop.mp3" preload="auto"></audio>

<script>
  const questions = [
    "Do you want to read this message? 💕",
    "Only if you feel like it 💖",
    "Like for real? 😏",
    "Are you really sure? 🤔",
    "I'm nervous asking this... but do you want to see it? 😳",
    "Okay then… here we go! 💖"
  ];
  let step = 0;

  function nextQuestion() {
    step++;
    if (step < questions.length) {
      document.getElementById("question").innerText = questions[step];
    } else {
      // Show envelope instead of redirect
      document.getElementById("yesBtn").style.display = "none";
      document.getElementById("question").style.display = "none";
      document.getElementById("envelope").style.display = "block";
    }
  }

  // Envelope click logic
  const envelope = document.getElementById("envelope");
  const popSound = document.getElementById("popSound");

  envelope.onclick = function() {
    envelope.classList.add("zoom"); // zoom in animation
    popSound.play();
    setTimeout(() => {
      window.location.href = 'message.html'; // go to your message page
    }, 1200); // wait for zoom animation
  }
</script>

</body>
</html>
