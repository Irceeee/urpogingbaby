<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #ffb6c1, #ffc0cb);
      font-family: 'Poppins', sans-serif;
      color: #fff;
      text-align: center;
    }
    h1 { font-size: 2em; margin-bottom: 20px; }
    button {
      margin: 10px;
      padding: 12px 25px;
      font-size: 1em;
      border: none;
      border-radius: 30px;
      background: #ff69b4;
      color: white;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #fff;
    }
    /* Animations */
    .shake {
      animation: shake 0.4s;
    }
    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }
    .bounce {
      animation: bounce 0.6s;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .glow {
      animation: glow 1s ease-in-out infinite alternate;
    }
            .heart {
      position: absolute;
      font-size: 24px;
      color: red;
      opacity: 0.7;
      animation: floatUp 8s linear infinite;
    }
    @keyframes glow {
      from { box-shadow: 0 0 5px #ff69b4; }
      to { box-shadow: 0 0 20px #fff; }
    }
    @media (max-width: 600px) {
      h1 { font-size: 1.5em; }
      button { font-size: 0.9em; padding: 10px 20px; }
    }


  </style>
</head>
<body>
  <h1 id="question">Do you want to read this message? 💕</h1>
  <button id="yesBtn" onclick="nextQuestion()">Yes</button>
  <!-- floating hearts using emoji -->
  <div class="heart" style="left:10%; animation-delay:0s;">❤️</div>
  <div class="heart" style="left:30%; animation-delay:2s;">💖</div>
  <div class="heart" style="left:50%; animation-delay:4s;">💕</div>
  <div class="heart" style="left:70%; animation-delay:1s;">💞</div>
  <div class="heart" style="left:85%; animation-delay:3s;">💓</div>
<script>
  const questions = [
    "Do you want to read this message? 💕",
    "Only if you feel like it 💖",
    "Like for real? 😏",
    "Are you really sure? 🤔",
    "I'm nervous asking this... but do you want to see it? 😳",
    "Okay then… here we go! 💖"
  ];
  let step = 0;

  function nextQuestion() {
    step++;

    // Select all buttons on the page
    const buttons = document.querySelectorAll("button");

    // Apply animations depending on step
    if ([1,4].includes(step)) {
      buttons.forEach(btn => {
        btn.classList.add("shake");
        setTimeout(() => btn.classList.remove("shake"), 10000);
      });
    } else if ([2,5].includes(step)) {
      buttons.forEach(btn => {
        btn.classList.add("bounce");
        setTimeout(() => btn.classList.remove("bounce"), 7000);
      });
    } else if ([3,6].includes(step)) {
      buttons.forEach(btn => btn.classList.add("glow"));
    }

    // Update question text or redirect
    if (step < questions.length) {
      document.getElementById("question").innerText = questions[step];
    } else {
      location.href = 'message.html';
    }
  }
</script>

</body>
</html>
